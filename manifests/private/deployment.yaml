# Orchestrator — runs in the PRIVATE cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      # kind has no cross-cluster DNS. This placeholder IP is patched in by
      # `make deploy` once the public cluster's node IP is known.
      hostAliases:
        - ip: "0.0.0.0"
          hostnames:
            - "public-cluster"
      containers:
        - name: orchestrator
          image: orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PUBLIC_WORKER_URL
              value: "https://public-cluster:30081/query"
            - name: PUBLIC_WORKER_CERT
              value: "/certs/client.crt"
            - name: PUBLIC_WORKER_KEY
              value: "/certs/client.key"
            - name: PUBLIC_WORKER_CA
              value: "/certs/ca.crt"
          volumeMounts:
            - name: mtls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: mtls-certs
          secret:
            secretName: mtls-certs-private
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  type: NodePort
  selector:
    app: orchestrator
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
