apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: hybrid-private:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PUBLIC_WORKER_URL
              value: "https://public-worker.default.svc.cluster.local:8080"
            - name: PUBLIC_WORKER_CERT
              value: "/certs/client.crt"
            - name: PUBLIC_WORKER_KEY
              value: "/certs/client.key"
            - name: PUBLIC_WORKER_CA
              value: "/certs/ca.crt"
            - name: PRIVATE_CHROMA_PATH
              value: "/data/chroma/private"
          volumeMounts:
            - name: mtls-certs
              mountPath: /certs
              readOnly: true
            - name: chroma-data
              mountPath: /data/chroma
      volumes:
        - name: mtls-certs
          secret:
            secretName: mtls-certs-private
        - name: chroma-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: default
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
