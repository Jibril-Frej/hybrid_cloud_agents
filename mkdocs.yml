site_name: Hybrid Cloud Agents
site_description: LangGraph RAG agent spanning private on-prem and public cloud clusters
repo_url: https://github.com/Jibril-Frej/hybrid_cloud_agents

theme:
  name: material
  palette:
    scheme: default
    primary: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: google

nav:
  - Home: index.md
  - V1 Spec: v1-spec.md
  - API Reference:
      - Wire models: api/common.md
      - Public worker: api/public.md
      - Orchestrator: api/orchestrator.md
      - Private ingest: api/private.md

docs_dir: docs
